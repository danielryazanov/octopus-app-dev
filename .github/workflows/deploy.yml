name: CI/CD to AWS

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/octopus-app:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/octopus-app:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. בדיקה והתקנת Docker במידה וחסר
            if ! command -v docker &> /dev/null; then
              echo "Docker not found. Installing..."
              sudo apt-get update
              sudo apt-get install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ubuntu
            fi

            # 2. משיכת האימג' המעודכן מ-Docker Hub
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/octopus-app:latest

            # 3. עצירת קונטיינר ישן (אם קיים) והרצת החדש
            sudo docker stop octopus-app || true
            sudo docker rm octopus-app || true
            
            # הרצה על פורט 80 (חיצוני) מול 3000 (פנימי של האפליקציה)
            sudo docker run -d \
              --name octopus-app \
              -p 80:3000 \
              ${{ secrets.DOCKER_USERNAME }}/octopus-app:latest