name: CI/CD Final Production - Atlas & Monitoring

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/octopus-app:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/octopus-app:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. התקנה/עדכון של Docker Compose
            sudo curl -L "https://github.com/docker/compose/releases/download/v2.26.1/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
            
            # 2. הכנת תיקיות להגדרות
            mkdir -p ~/app/nginx ~/app/prometheus
            cd ~/app

            # 3. יצירת הגדרות Nginx
            cat <<EOF > nginx/nginx.conf
            events { worker_connections 1024; }
            http {
                server {
                    listen 80;
                    location / {
                        proxy_pass http://app:3000;
                        proxy_set_header Host \$host;
                        proxy_set_header X-Real-IP \$remote_addr;
                    }
                }
            }
            EOF

            # 4. יצירת הגדרות Prometheus
            cat <<EOF > prometheus/prometheus.yml
            global:
              scrape_interval: 15s
            scrape_configs:
              - job_name: 'nodejs-app'
                static_configs:
                  - targets: ['app:3000']
            EOF

            # 5. יצירת ה-Docker Compose המלא (כולל הניטור וה-URI הנכון)
            cat <<EOF > docker-compose.yaml
            services:
              app:
                image: ${{ secrets.DOCKER_USERNAME }}/octopus-app:latest
                restart: always
                environment:
                  - MONGO_URI=mongodb+srv://octopus_user:YJpn6ZTdPdIbNBXq@danielmongo.3yle095.mongodb.net/test?retryWrites=true&w=majority&appName=danielMongo
              nginx:
                image: nginx:alpine
                restart: always
                ports:
                  - "80:80"
                volumes:
                  - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
                depends_on:
                  - app
              prometheus:
                image: prom/prometheus:latest
                restart: always
                ports:
                  - "9090:9090"
                volumes:
                  - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
              grafana:
                image: grafana/grafana:latest
                restart: always
                ports:
                  - "3000:3000"
            EOF

            # 6. הרצה מחדש נקייה
            sudo /usr/local/bin/docker-compose down --remove-orphans || true
            sudo /usr/local/bin/docker-compose pull
            sudo /usr/local/bin/docker-compose up -d