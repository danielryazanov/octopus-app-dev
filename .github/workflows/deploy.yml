name: CI/CD to AWS

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/octopus-app:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/octopus-app:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. הסרת גרסה ישנה ובעייתית של Docker Compose (שגורמת ל-KeyError)
            sudo apt-get remove -y docker-compose || true

            # 2. התקנת Docker (במידה וחסר)
            if ! command -v docker &> /dev/null; then
              sudo apt-get update
              sudo apt-get install -y docker.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ubuntu
            fi

            # 3. התקנה נקייה של Docker Compose V2 החדש ביותר
            sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose

            # 4. הכנת תיקיית האפליקציה בשרת
            mkdir -p ~/app
            cd ~/app

            # 5. יצירת קובץ ה-docker-compose.yaml בשרת
            cat <<EOF > docker-compose.yaml
            version: '3.8'
            services:
              app:
                image: ${{ secrets.DOCKER_USERNAME }}/octopus-app:latest
                ports:
                  - "80:3000"
                environment:
                  - MONGO_URI=mongodb://db:27017/fruitsDB
                depends_on:
                  - db
                restart: always
              db:
                image: mongo:latest
                container_name: mongodb
                restart: always
                volumes:
                  - mongodb_data:/data/db
            volumes:
              mongodb_data:
            EOF

            # 6. הרצה מנצחת (שימוש בנתיב המלא כדי לוודא שמשתמשים בגרסה החדשה)
            sudo /usr/local/bin/docker-compose down || true
            sudo /usr/local/bin/docker-compose pull
            sudo /usr/local/bin/docker-compose up -d