name: CI/CD Final Step-by-Step

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/octopus-app:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/octopus-app:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. התקנת Docker Compose V2 אם חסר
            if ! command -v docker-compose &> /dev/null; then
              sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
            fi

            # 2. כניסה לתיקייה
            mkdir -p ~/app
            cd ~/app

            # 3. יצירת ה-Compose (בגרסה מודרנית ללא ה-Warning)
            cat <<EOF > docker-compose.yaml
            services:
              app:
                image: ${{ secrets.DOCKER_USERNAME }}/octopus-app:latest
                restart: always
                ports:
                  - "80:3000"
                environment:
                  - MONGO_URI=mongodb://db:27017/fruitsDB
                depends_on:
                  - db
              db:
                image: mongo:latest
                container_name: mongodb
                restart: always
                volumes:
                  - mongodb_data:/data/db
            volumes:
              mongodb_data:
            EOF

            # 4. ניקוי יסודי של השרת מקונטיינרים קודמים (פותר את שגיאת ה-Conflict)
            sudo /usr/local/bin/docker-compose down --remove-orphans || true
            sudo docker rm -f mongodb octopus-app || true

            # 5. הרצה נקייה
            sudo /usr/local/bin/docker-compose pull
            sudo /usr/local/bin/docker-compose up -d