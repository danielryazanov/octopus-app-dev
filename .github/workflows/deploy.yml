name: CI/CD Final Production - Atlas Edition

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/octopus-app:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/octopus-app:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. הכנת תשתית ותיקיות
            mkdir -p ~/app/nginx ~/app/prometheus
            cd ~/app

            # 2. יצירת הגדרות Nginx
            cat <<EOF > nginx/nginx.conf
            events { worker_connections 1024; }
            http {
                server {
                    listen 80;
                    location / {
                        proxy_pass http://app:3000;
                        proxy_set_header Host \$host;
                        proxy_set_header X-Real-IP \$remote_addr;
                    }
                }
            }
            EOF

            # 3. יצירת הגדרות Prometheus
            cat <<EOF > prometheus/prometheus.yml
            global:
              scrape_interval: 15s
            scrape_configs:
              - job_name: 'nodejs-app'
                static_configs:
                  - targets: ['app:3000']
            EOF

            # 4. יצירת ה-Docker Compose המעודכן (ללא DB מקומי)
            cat <<EOF > docker-compose.yaml
            services:
              app:
                image: ${{ secrets.DOCKER_USERNAME }}/octopus-app:latest
                restart: always
                environment:
                  - MONGO_URI=mongodb+srv://octopus_user:YJpn6ZTdPdiBNBXq@danielmongo.3yle095.mongodb.net/fruitsDB?retryWrites=true&w=majority&appName=danielMongo
                # אין צורך ב-depends_on כי ה-DB בענן
              nginx:
                image: nginx:alpine
                restart: always
                ports:
                  - "80:80"
                volumes:
                  - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
                depends_on:
                  - app
              prometheus:
                image: prom/prometheus:latest
                restart: always
                ports:
                  - "9090:9090"
                volumes:
                  - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
              grafana:
                image: grafana/grafana:latest
                restart: always
                ports:
                  - "3000:3000"
            EOF

            # 5. ניקוי יסודי והרצה
            # מוחקים את ה-mongodb הישן מהשרת כדי לפנות זיכרון ומשאבים
            sudo docker rm -f mongodb octopus-app nginx prometheus grafana || true
            sudo docker system prune -f || true
            
            sudo docker compose pull
            sudo docker compose up -d