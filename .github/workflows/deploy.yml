name: CI/CD Final Production - Atlas Edition

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/octopus-app:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/octopus-app:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. התקנה ידנית של Docker Compose (גרסה 2 יציבה)
            sudo curl -L "https://github.com/docker/compose/releases/download/v2.26.1/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
            
            # 2. הכנת תיקיות
            mkdir -p ~/app/nginx ~/app/prometheus
            cd ~/app

            # 3. יצירת הגדרות Nginx
            cat <<EOF > nginx/nginx.conf
            events { worker_connections 1024; }
            http {
                server {
                    listen 80;
                    location / {
                        proxy_pass http://app:3000;
                        proxy_set_header Host \$host;
                        proxy_set_header X-Real-IP \$remote_addr;
                    }
                }
            }
            EOF

            # 4. יצירת ה-Docker Compose המעודכן (ללא DB מקומי)
            cat <<EOF > docker-compose.yaml
            services:
              app:
                image: ${{ secrets.DOCKER_USERNAME }}/octopus-app:latest
                restart: always
                environment:
                  - MONGO_URI=mongodb+srv://octopus_user:YJpn6ZTdPdiBNBXq@danielmongo.3yle095.mongodb.net/fruitsDB?retryWrites=true&w=majority&appName=danielMongo
              nginx:
                image: nginx:alpine
                restart: always
                ports:
                  - "80:80"
                volumes:
                  - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
                depends_on:
                  - app
            EOF

            # 5. ניקוי יסודי והרצה עם הנתיב המלא (מונע את שגיאת unknown command)
            sudo /usr/local/bin/docker-compose down --remove-orphans || true
            sudo docker rm -f octopus-app nginx || true
            
            sudo /usr/local/bin/docker-compose pull
            sudo /usr/local/bin/docker-compose up -d