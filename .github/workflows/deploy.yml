name: CI/CD to AWS

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/octopus-app:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/octopus-app:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. התקנת Docker Compose אם חסר
            if ! command -v docker-compose &> /dev/null; then
              sudo apt-get update
              sudo apt-get install -y docker-compose
            fi

            # 2. יצירת תיקיית פרויקט בשרת
            mkdir -p ~/app
            cd ~/app

            # 3. יצירת קובץ docker-compose.yaml בשרת (שימוש ב-HERE DOC)
            cat <<EOF > docker-compose.yaml
            version: '3'
            services:
              app:
                image: ${{ secrets.DOCKER_USERNAME }}/octopus-app:latest
                ports:
                  - "80:3000"
                environment:
                  - MONGO_URI=mongodb://mongodb:27017/fruitsDB
                depends_on:
                  - mongodb
              mongodb:
                image: mongo:latest
                container_name: mongodb
            EOF

            # 4. הרצת המערכת
            sudo docker-compose pull
            sudo docker-compose up -d